name: Microservices CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push-all:
    runs-on: ubuntu-latest
    
    # Yahan hum GitHub ko bata rahe hain ki in 12 services par same loop chalana hai
    strategy:
      matrix:
        service: 
          - adservice
          - cartservice
          - checkoutservice
          - shoppingassistantservice
          - shippingservice
          - recommendationservice
          - productcatalogservice
          - paymentservice
          - loadgenerator
          - frontend
          - emailservice
          - currencyservice

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step: Docker Build
      # '${{ matrix.service }}' apna naam automatically list se uthayega (e.g., src/adservice)
     # Step: Docker Build with custom Dockerfile path
      - name: Build Docker Image for ${{ matrix.service }}
        run: |
          docker build \
            -f ./src/${{ matrix.service }}/src/Dockerfile \
            -t ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest \
            ./src/${{ matrix.service }}

      # Step: Trivy Scan
      - name: Run Trivy Scanner for ${{ matrix.service }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '0' # (Learning ke liye abhi 0 rakha hai taaki pipeline block na ho)
          severity: 'CRITICAL,HIGH'

      # Step: Docker Push
      - name: Push Docker Image for ${{ matrix.service }}
        run: |
          docker push ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest